# X-Plane asset catalog
# Maps (building_type × size_bucket) → .fac virtual path
# Maps (esa_class × koppen_zone) → .for virtual path
#
# Köppen zones used: tropical, arid, temperate, continental, polar
# Size buckets: small (<200 m²), medium (200–1000 m²), large (>1000 m²)

facades:
  residential:
    small:   lib/buildings/facades/generic/low_modern_01.fac
    medium:  lib/buildings/facades/generic/mid_classic_01.fac
    large:   lib/buildings/facades/generic/mid_modern_01.fac
  commercial:
    small:   lib/buildings/facades/commercial/low_commercial_01.fac
    medium:  lib/buildings/facades/commercial/low_commercial_03.fac
    large:   lib/buildings/facades/commercial/low_commercial_05.fac
  industrial:
    small:   lib/buildings/facades/industrial/warehouse_01_45x45.fac
    medium:  lib/buildings/facades/industrial/warehouse_03_60x60.fac
    large:   lib/buildings/facades/industrial/warehouse_08_90x90.fac
  religious:
    small:   lib/buildings/facades/generic/mid_classic_01.fac
    medium:  lib/buildings/facades/generic/mid_classic_02.fac
    large:   lib/buildings/facades/generic/high_classic_01.fac
  agricultural:
    small:   lib/buildings/facades/industrial/warehouse_01_45x45.fac
    medium:  lib/buildings/facades/industrial/warehouse_03_60x60.fac
    large:   lib/buildings/facades/industrial/warehouse_06_90x40.fac
  generic:
    small:   lib/buildings/facades/generic/low_modern_01.fac
    medium:  lib/buildings/facades/generic/mid_modern_01.fac
    large:   lib/buildings/facades/generic/high_universal_01.fac

forests:
  # ESA class 10: tree cover
  tree_cover:
    tropical:    lib/vegetation/forests/broadleaves/very_hot.for
    arid:        lib/vegetation/forests/broadleaves/hot_dry.for
    temperate:   lib/vegetation/forests/broadleaves/temperate.for
    continental: lib/vegetation/forests/broadleaves/cold.for
    polar:       lib/vegetation/forests/conifers/cold.for
  # ESA class 20: shrubland
  shrubland:
    tropical:    lib/g8/shrb_tmp_rain.for
    arid:        lib/g8/shrb_cld_dry.for
    temperate:   lib/g8/shrb_tmp_rain.for
    continental: lib/g8/shrb_cld_wet.for
    polar:       lib/g8/shrb_cld_dry.for
  # ESA class 30: grassland
  grassland:
    tropical:    lib/vegetation/forests/mixed/very_hot.for
    arid:        lib/vegetation/forests/mixed/hot_dry.for
    temperate:   lib/vegetation/forests/mixed/temperate.for
    continental: lib/vegetation/forests/mixed/cold.for
    polar:       lib/vegetation/forests/conifers/cold_low.for
  # ESA class 40: cropland
  cropland:
    tropical:    lib/vegetation/AG_hot_dry_1.for
    arid:        lib/vegetation/AG_hot_dry_1.for
    temperate:   lib/vegetation/AG_temp_1.for
    continental: lib/vegetation/AG_temp_2.for
    polar:       lib/vegetation/forests/conifers/cold_low.for
  # ESA class 90: wetland
  wetland:
    tropical:    lib/g8/shrb_tmp_rain.for
    arid:        lib/g8/shrb_cld_wet.for
    temperate:   lib/g8/shrb_tmp_rain.for
    continental: lib/g8/shrb_cld_wet.for
    polar:       lib/g8/shrb_cld_wet.for
  # ESA class 95: mangrove
  mangrove:
    tropical:    lib/vegetation/forests/broadleaves/very_hot.for
    arid:        lib/vegetation/forests/broadleaves/very_hot.for
    temperate:   lib/vegetation/forests/broadleaves/warm.for
    continental: lib/vegetation/forests/broadleaves/warm.for
    polar:       lib/vegetation/forests/broadleaves/warm.for
  # ESA class 100: moss/lichen
  moss_lichen:
    tropical:    lib/g8/shrb_cld_dry.for
    arid:        lib/g8/shrb_cld_dry.for
    temperate:   lib/g8/shrb_cld_dry.for
    continental: lib/g8/shrb_cld_dry.for
    polar:       lib/g8/shrb_cld_dry.for
